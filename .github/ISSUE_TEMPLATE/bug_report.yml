name: Bug report
description: Report a reproducible problem in Local AI CRM
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Local AI CRM.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. Open...\n2. Run...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, browser, Node/Python version"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or sample data
      description: Remove secrets and private data before sharing.
